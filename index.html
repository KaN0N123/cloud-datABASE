<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Cloud Database</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* ── TOKENS / DESIGN SYSTEM ──────────────────────────── */
    :root {
      --navy:   #0F172A;
      --navy2:  #1E293B;
      --slate:  #334155;
      --muted:  #64748B;
      --border: #E2E8F0;
      --bg:     #F8FAFC;
      --white:  #FFFFFF;
      --teal:   #0EA5E9;
      --teal2:  #0284C7;
      --green:  #10B981;
      --red:    #EF4444;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(15,23,42,.10);
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      background: var(--navy);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      background-image: radial-gradient(circle, rgba(14,165,233,.25) 1px, transparent 1px);
      background-size: 24px 24px;
      background-color: var(--navy);
    }
    .header-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 64px;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: var(--teal);
      border-radius: 8px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 20px; height: 20px; fill: white; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--white); letter-spacing: -.01em; }
    header p  { font-size: .75rem; color: var(--muted); margin-left: auto; }

    /* ── MAIN LAYOUT ─────────────────────────────────────── */
    main { max-width: 1040px; margin: 32px auto; padding: 0 24px 48px; }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header h2 {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .badge {
      background: var(--teal);
      color: white;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }

    /* ── FORM ────────────────────────────────────────────── */
    .form-body { padding: 20px; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 680px) { .form-grid { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .field input {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .9rem;
      color: var(--navy);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      background: var(--bg);
    }
    .field input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14,165,233,.12);
      background: white;
    }
    .field input.error-input {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,.10);
    }
    .field-error { font-size: .72rem; color: var(--red); min-height: 16px; }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 7px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: var(--teal); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--teal2); }
    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1.5px solid rgba(239,68,68,.25);
      padding: 6px 12px;
      font-size: .78rem;
    }
    .btn-danger:hover:not(:disabled) {
      background: rgba(239,68,68,.06);
      border-color: var(--red);
    }

    /* ── TABLE ───────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead tr { background: var(--bg); border-bottom: 2px solid var(--border); }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    th.col-no   { width: 52px; text-align: center; }
    th.col-action { width: 100px; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s, opacity .3s, transform .3s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #F0F9FF; }
    tbody tr.removing { opacity: 0; transform: translateX(20px); }
    td { padding: 13px 16px; color: var(--slate); }
    td.td-no {
      text-align: center;
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    td .name-cell { font-weight: 600; color: var(--navy); }
    td .code-pill {
      display: inline-block;
      background: #EFF6FF;
      color: #1D4ED8;
      border: 1px solid #BFDBFE;
      border-radius: 5px;
      padding: 2px 8px;
      font-size: .78rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 600;
    }
    td .time-cell {
      font-size: .78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── STATES / LOADERS ────────────────────────────────── */
    .state-row td { text-align: center; padding: 40px; color: var(--muted); }
    .state-icon { font-size: 2rem; margin-bottom: 8px; }
    .state-label { font-size: .875rem; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(14,165,233,.3);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONFIRM MODAL ───────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.45);
      backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      animation: fadeIn .15s ease;
    }
    .modal-backdrop.hiding { animation: fadeOut .15s ease forwards; }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px 28px 22px;
      max-width: 380px;
      width: calc(100% - 48px);
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: slideUp .18s ease;
    }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-icon { font-size: 2rem; text-align: center; margin-bottom: 12px; }
    .modal h3 { font-size: 1rem; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .modal p  { font-size: .85rem; color: var(--muted); text-align: center; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel {
      background: var(--bg); color: var(--slate); border: 1.5px solid var(--border);
      padding: 9px 20px; border-radius: 7px; font-size: .875rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-cancel:hover { background: var(--border); }
    .btn-confirm-del {
      background: var(--red); color: white; border: none;
      padding: 9px 20px; border-radius: 7px; font-size: .875rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-confirm-del:hover { background: #DC2626; }

    /* ── TOASTS ──────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 10px; z-index: 999;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; border-radius: 9px;
      font-size: .875rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      animation: slideIn .25s ease; max-width: 340px; border-left: 4px solid;
    }
    .toast.success { background: white; color: var(--navy); border-color: var(--green); }
    .toast.error   { background: white; color: var(--navy); border-color: var(--red); }
    .toast-icon { font-size: 1rem; flex-shrink: 0; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    #student-count { transition: all .2s; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
    </div>
    <h1>Student Cloud Database</h1>
    <p>Powered by Supabase</p>
  </div>
</header>

<main>

  <div class="card">
    <div class="card-header">
      <h2>Add Student</h2>
    </div>
    <div class="form-body">
      <div class="form-grid">
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" placeholder="e.g. Nguyễn Văn A" autocomplete="off" />
          <span class="field-error" id="err-name"></span>
        </div>
        <div class="field">
          <label for="code">Student Code</label>
          <input id="code" placeholder="e.g. SV001" autocomplete="off" />
          <span class="field-error" id="err-code"></span>
        </div>
        <div class="field">
          <label for="class">Class</label>
          <input id="class" placeholder="e.g. CNTT-K65" autocomplete="off" />
          <span class="field-error" id="err-class"></span>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="add-btn" onclick="addStudent()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Student
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>All Students</h2>
      <span class="badge" id="student-count">…</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-no">No.</th>
            <th>Full Name</th>
            <th>Student Code</th>
            <th>Class</th>
            <th>Created At</th>
            <th class="col-action">Action</th>
          </tr>
        </thead>
        <tbody id="list">
          <tr class="state-row" id="loading-row">
            <td colspan="6">
              <div class="state-icon"><span class="spinner"></span></div>
              <div class="state-label">Loading students…</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<div id="toast-container"></div>

<script>
  /* ── CONFIG KẾT NỐI SUPABASE ─────────────────────────── */
  const SUPABASE_URL  = 'https://phnucxlhhanxmkzxhuxk.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobnVjeGxoaGFueG1renhodXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzMxNzQsImV4cCI6MjA5Njc0OTE3NH0.Xh2_pg5n4UHDSvyK6DfQLC8tUucuLGnIZyGy7T5r1EE';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  /* ── BỘ NHỚ TẠM (STATE) ──────────────────────────────── */
  let students = [];

  /* ── HIỂN THỊ TOAST THÔNG BÁO ───────────────────────── */
  function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span class="toast-icon">${type === 'success' ? '✅' : '❌'}</span>${msg}`;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  /* ── HỘP THOẠI XÁC NHẬN XÓA (CUSTOM MODAL) ───────────── */
  function confirmDialog(name) {
    return new Promise(resolve => {
      const wrap = document.createElement('div');
      wrap.className = 'modal-backdrop';
      wrap.innerHTML = `
        <div class="modal">
          <div class="modal-icon">🗑️</div>
          <h3>Delete Student</h3>
          <p>Are you sure you want to delete <strong>${escHtml(name)}</strong>?<br>This action cannot be undone.</p>
          <div class="modal-actions">
            <button class="btn-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-confirm-del" id="modal-confirm">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
              Delete
            </button>
          </div>
        </div>`;
      document.body.appendChild(wrap);

      const cleanup = (result) => {
        wrap.classList.add('hiding');
        setTimeout(() => wrap.remove(), 150);
        resolve(result);
      };

      wrap.querySelector('#modal-cancel').onclick  = () => cleanup(false);
      wrap.querySelector('#modal-confirm').onclick = () => cleanup(true);
      wrap.addEventListener('click', e => { if (e.target === wrap) cleanup(false); });
    });
  }

  /* ── ĐỊNH DẠNG THỜI GIAN (VIỆT NAM) ─────────────────── */
  function formatDate(isoString) {
    if (!isoString) return '—';
    const d = new Date(isoString);
    if (isNaN(d)) return '—';
    return d.toLocaleString('vi-VN', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
  }

  /* ── MÃ HÓA HTML TRÁNH LỖI BẢO MẬT XSS ────────────────── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── ĐỔ DỮ LIỆU VÀO BẢNG GIAO DIỆN ───────────────────── */
  function renderTable() {
    const tbody = document.getElementById('list');
    tbody.innerHTML = '';

    if (students.length === 0) {
      tbody.innerHTML = `<tr class="state-row"><td colspan="6">
        <div class="state-icon">🎓</div>
        <div class="state-label">No students yet. Add the first one above!</div></td></tr>`;
      updateCount(0);
      return;
    }

    students.forEach((s, idx) => {
      const tr = document.createElement('tr');
      tr.id = `row-${s.id}`;
      tr.innerHTML = `
        <td class="td-no">${idx + 1}</td>
        <td><span class="name-cell">${escHtml(s.full_name)}</span></td>
        <td><span class="code-pill">${escHtml(s.student_code)}</span></td>
        <td>${escHtml(s.class_name)}</td>
        <td><span class="time-cell">${formatDate(s.created_at)}</span></td>
        <td>
          <button class="btn btn-danger" onclick="deleteStudent(${s.id}, '${escHtml(s.full_name)}', this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            Delete
          </button>
        </td>`;
      tbody.appendChild(tr);
    });

    updateCount(students.length);
  }

  /* ── CẬP NHẬT SỐ LƯỢNG BADGE ────────────────────────── */
  function updateCount(n) {
    document.getElementById('student-count').textContent = n;
  }

  /* ── KIỂM TRA DỮ LIỆU ĐẦU VÀO (VALIDATION) ───────────── */
  function validateForm() {
    const fields = [
      { id: 'name',  errId: 'err-name',  label: 'Full name' },
      { id: 'code',  errId: 'err-code',  label: 'Student code' },
      { id: 'class', errId: 'err-class', label: 'Class' },
    ];
    let valid = true;
    fields.forEach(({ id, errId, label }) => {
      const el  = document.getElementById(id);
      const err = document.getElementById(errId);
      if (!el.value.trim()) {
        el.classList.add('error-input');
        err.textContent = `${label} is required.`;
        valid = false;
      } else {
        el.classList.remove('error-input');
        err.textContent = '';
      }
    });
    return valid;
  }

  /* ── XÓA TRẮNG FORM SAU KHI THÊM THÀNH CÔNG ─────────── */
  function clearForm() {
    ['name','code','class'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
      el.classList.remove('error-input');
    });
    ['err-name','err-code','err-class'].forEach(id =>
      document.getElementById(id).textContent = ''
    );
  }

  /* ── CHỨC NĂNG: TẢI DANH SÁCH SINH VIÊN TỪ CLOUD ─────── */
  async function loadStudents() {
    const tbody = document.getElementById('list');
    tbody.innerHTML = `<tr class="state-row" id="loading-row">
      <td colspan="6"><div class="state-icon"><span class="spinner"></span></div>
      <div class="state-label">Loading students…</div></td></tr>`;

    const { data, error } = await db
      .from('students')
      .select('id, full_name, student_code, class_name, created_at')
      .order('created_at', { ascending: false });

    if (error) {
      tbody.innerHTML = `<tr class="state-row"><td colspan="6">
        <div class="state-icon">⚠️</div>
        <div class="state-label">Failed to load: ${escHtml(error.message)}</div></td></tr>`;
      return;
    }

    students = data || [];
    renderTable();
  }

  /* ── CHỨC NĂNG: THÊM MỚI SINH VIÊN ──────────────────── */
  async function addStudent() {
    if (!validateForm()) return;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Saving…`;

    const full_name    = document.getElementById('name').value.trim();
    const student_code = document.getElementById('code').value.trim();
    const class_name   = document.getElementById('class').value.trim();
    const now = new Date().toISOString();

    // Gửi dữ liệu lên Supabase (Bỏ trường id, để DB tự tăng)
    const { data, error } = await db
      .from('students')
      .insert([{ full_name, student_code, class_name, created_at: now }])
      .select('id, full_name, student_code, class_name, created_at')
      .single();

    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Student`;

    if (error) {
      if (error.code === '23505') { // Mã lỗi trùng Unique Key của Postgres
        document.getElementById('err-code').textContent = 'This student code already exists.';
        document.getElementById('code').classList.add('error-input');
      }
      showToast('Could not add student: ' + error.message, 'error');
      return;
    }

    clearForm();

    // Đẩy bản ghi mới lên đầu mảng local và cập nhật giao diện ngay lập tức
    students.unshift(data);
    renderTable();

    showToast(`${escHtml(full_name)} added successfully!`, 'success');
  }

  /* ── CHỨC NĂNG: XÓA SINH VIÊN ────────────────────────── */
  async function deleteStudent(id, name, btn) {
    const confirmed = await confirmDialog(name);
    if (!confirmed) return;

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>`;

    const { error } = await db.from('students').delete().eq('id', id);

    if (error) {
      btn.disabled = false;
      btn.innerHTML = `Delete`;
      showToast('Delete failed: ' + error.message, 'error');
      return;
    }

    // Hiệu ứng mờ dần (Fade-out) dòng trước khi xóa hẳn
    const row = document.getElementById(`row-${id}`);
    if (row) {
      row.classList.add('removing');
      setTimeout(() => {
        students = students.filter(s => s.id !== id);
        renderTable();
      }, 300);
    } else {
      students = students.filter(s => s.id !== id);
      renderTable();
    }

    showToast('Student deleted.', 'success');
  }

  /* ── XOÁ LỖI HIỂN THỊ KHI NGƯỜI DÙNG ĐANG GÕ ─────────── */
  ['name','code','class'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
